[project]
name = "demo-packaged-application"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Henrique Vitoi", email = "44772383+hvitoi@users.noreply.github.com" },
]
requires-python = ">=3.14"
dependencies = ["requests>=2.33.1"]

[project.scripts]
demo = "demo_packaged_application:main" # from package "demo_packaged_application" invoke function "main" (requires __init__.py)

[dependency-groups]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"
